# ActiveMQ Configuration
spring.activemq.broker-url=tcp://localhost:61616
spring.activemq.user=admin
spring.activemq.password=admin
spring.activemq.pool.enabled=true
spring.activemq.pool.max-connections=10
spring.activemq.pool.maximum-active-session-per-connection=500
spring.activemq.pool.idle-timeout=30000
spring.activemq.packages.trust-all=true

# JMS Configuration
spring.jms.pub-sub-domain=false
spring.jms.listener.acknowledge-mode=client
spring.jms.listener.concurrency=3-10

# Server Configuration
server.port=8080

# Logging
logging.level.com.example=DEBUG
logging.level.org.apache.activemq=INFO

# Custom Configuration
activemq.queue.default=BOOT_QUEUE
activemq.queue.order=ORDER_QUEUE
activemq.topic.default=BOOT_TOPIC
activemq.topic.notification=NOTIFICATION_TOPIC
